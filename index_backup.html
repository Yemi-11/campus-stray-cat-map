                feedMarker.on('click', () => {
                    let info = new AMap.InfoWindow({ content: '<div style="padding:5px; font-size:12px;">馃嵔锔?'+spot.name+'<br>鎺ㄨ崘鎶曞杺鐐癸紝璇锋斁鐚伯/娓呮按</div>' });
                    info.open(map, spot.pos);
                });
            });

            AMap.plugin('AMap.Heatmap', () => {
                heatmap = new AMap.Heatmap(map, {
                    radius: 25,
                    opacity: [0, 0.7],
                    visible: false
                });
                let heatData = catsData.filter(c => c.lat).map(c => ({ lng: c.lng, lat: c.lat, count: 12 }));
                heatmap.setDataSet({ data: heatData, max: 20 });
            });

        } catch (error) {
            console.error('鍦板浘鍒濆鍖栧け璐?', error);
        }
    }

    const modal = document.getElementById("checkinModal");
    let currentCheckinType = "鍋堕亣";

    function openModal(type) {
        currentCheckinType = type;
        document.getElementById("modalTypeText").innerHTML = `${type}鎵撳崱 路 涓婁紶鐓х墖AI杈呭姪璇嗗埆`;
        modal.style.display = "flex";
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                document.getElementById("checkinLocation").value = `鑷姩瀹氫綅 (${pos.coords.latitude.toFixed(4)},${pos.coords.longitude.toFixed(4)})`;
            }, () => {});
        }
    }

    document.getElementById("encounterBtn").onclick = () => openModal("鍋堕亣");
    document.getElementById("feedBtn").onclick = () => openModal("鎶曞杺");
    document.getElementById("closeModal").onclick = () => modal.style.display = "none";

    modal.addEventListener("click", (e) => {
        if (e.target === modal) modal.style.display = "none";
    });

    document.getElementById("submitCheckin").onclick = () => {
        let loc = document.getElementById("checkinLocation").value || "鏍″洯鏌愬";
        let note = document.getElementById("checkinNote").value;
        let file = document.getElementById("checkinPhoto").files[0];
        let aiMsg = "鏈瘑鍒?;
        if (file) aiMsg = "馃 AI妯℃嫙璇嗗埆: 鐤戜技姗樼尗/鐙歌姳 (寰呯鐞嗗憳纭)";
        const newRecord = { id: Date.now(), user: "娌虫捣鍠佃鑰?, type: currentCheckinType, location: loc, note, ai: aiMsg, status: "pending", timestamp: new Date().toLocaleString() };
        pendingCheckins.push(newRecord);
        renderAuditTable();
        modal.style.display = "none";
        document.getElementById("checkinPhoto").value = "";
        alert("鎵撳崱宸叉彁浜わ紝绛夊緟绠＄悊鍛樺鏍糕湪");
    };

    function renderAuditTable() {
        const tbody = document.getElementById("auditTbody");
        tbody.innerHTML = pendingCheckins.map((item, idx) => `
            <tr>
                <td>${item.user}</td><td>${item.type}</td><td>${item.location}</td><td>${item.ai}</td>
                <td><button class="action-btn approve-btn" data-idx="${idx}">閫氳繃</button><button class="action-btn reject-btn" data-idx="${idx}">鎷掔粷</button></td>
            </tr>
        `).join('');
        document.querySelectorAll(".approve-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                let idx = btn.dataset.idx;
                let approved = pendingCheckins[idx];
                userCheckins.push({ ...approved, status: "approved" });
                localStorage.setItem("hhucat_checkins", JSON.stringify(userCheckins));
                pendingCheckins.splice(idx, 1);
                renderAuditTable();
                updatePersonalStats();
                alert("瀹℃牳閫氳繃锛屽湴鍥剧儹搴﹀鍔?);
                if (heatmap) heatmap.show();
            });
        });
        document.querySelectorAll(".reject-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                let idx = btn.dataset.idx;
                pendingCheckins.splice(idx, 1);
                renderAuditTable();
            });
        });
    }

    function updatePersonalStats() {
        document.getElementById("userCheckinCount").innerText = userCheckins.length;
        const listHtml = userCheckins.map(c => `<div class="comment"><strong>${c.type}鎵撳崱</strong> ${c.location}<br><small>${c.timestamp}</small><p>${c.note || ''}</p></div>`).join('');
        document.getElementById("userCheckinList").innerHTML = listHtml || "<div style='text-align:center; color:#999; padding:10px;'>鏆傛棤鎵撳崱璁板綍</div>";
        const thisMonth = userCheckins.filter(c => new Date(c.timestamp).getMonth() === new Date().getMonth()).length;
        document.getElementById("monthCheckinsStat").innerText = thisMonth + pendingCheckins.length;
        document.getElementById("totalCatsStat").innerText = catsData.length;
    }

    function renderFeedingSpotsList() {
        const container = document.getElementById("feedingSpotsList");
        container.innerHTML = feedingSpots.map((spot, index) => `
            <div class="panel-item feeding" data-index="${index}">
                馃嵔锔?${spot.name}
            </div>
        `).join('');
        document.querySelectorAll(".panel-item.feeding").forEach(item => {
            item.addEventListener("click", () => {
                document.querySelectorAll(".panel-item").forEach(i => i.classList.remove("active"));
                item.classList.add("active");
                const index = parseInt(item.dataset.index);
                const spot = feedingSpots[index];
                if (spot && map) {
                    map.setCenter(spot.pos);
                    map.setZoom(18);
                    let info = new AMap.InfoWindow({ 
                        content: '<div style="padding:8px; font-size:14px;">馃嵔锔?'+spot.name+'<br>鎺ㄨ崘鎶曞杺鐐癸紝璇锋斁鐚伯/娓呮按</div>' 
                    });
                    info.open(map, spot.pos);
                }
            });
        });
    }

    function renderCatLocationsList() {
        const container = document.getElementById("catLocationsList");
        
        const locationGroups = {};
        catsData.filter(cat => cat.lat && cat.lng).forEach(cat => {
            const key = cat.lat.toFixed(4) + ',' + cat.lng.toFixed(4);
            if (!locationGroups[key]) {
                locationGroups[key] = { location: cat.location, lat: cat.lat, lng: cat.lng, cats: [] };
            }
            locationGroups[key].cats.push(cat.name);
        });
        
        const locations = Object.values(locationGroups);
        container.innerHTML = locations.map((loc, index) => `
            <div class="panel-item cat" data-index="${index}">
                锟?${loc.location}
            </div>
        `).join('');
        
        document.querySelectorAll(".panel-item.cat").forEach(item => {
            item.addEventListener("click", () => {
                document.querySelectorAll(".panel-item").forEach(i => i.classList.remove("active"));
                item.classList.add("active");
                const index = parseInt(item.dataset.index);
                const loc = locations[index];
                if (loc && map) {
                    map.setCenter([loc.lng, loc.lat]);
                    map.setZoom(18);
                    const catsList = loc.cats.join('銆?);
                    let info = new AMap.InfoWindow({ 
                        content: '<div style="padding:8px; font-size:14px;">锟?'+loc.location+'<br>甯搁┗鐚挭: '+catsList+'</div>' 
                    });
                    info.open(map, [loc.lng, loc.lat]);
                }
            });
        });
    }

    function init() {
        renderCatGallery();
        showCatDetail(catsData[0]);
        initMap();
        renderFeedingSpotsList();
        renderCatLocationsList();
        renderAuditTable();
        updatePersonalStats();
        updateUserCommentCount();
        document.getElementById("hotSpotsStat").innerText = feedingSpots.length;
        const savedComments = localStorage.getItem("hhucat_comments");
        if (savedComments) {
            try {
                const arr = JSON.parse(savedComments);
                commentsMap.clear();
                arr.forEach(([k, v]) => commentsMap.set(parseInt(k), v));
                if (currentCat) renderStoryComments(currentCat.id);
                updateUserCommentCount();
            } catch(e) {}
        }
    }
    init();
</script>
</body>
</html>
